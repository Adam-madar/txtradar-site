  <g fill="none" stroke="#69dc96" stroke-opacity="0.55" stroke-width="1.3">
    <circle cx="16" cy="16" r="12"/>
    <circle cx="16" cy="16" r="7"/>
  </g>
  <path d="M16 16 L16 4 A12 12 0 0 1 26.4 10 Z" fill="#6ef096" fill-opacity="0.32"/>
  <circle cx="16" cy="16" r="2.6" fill="#7dffb0"/>
</svg>
